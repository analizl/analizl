name: Metrics
on:
  schedule: [{cron: "0 0 * * *"}] # Runs daily
  workflow_dispatch:
jobs:
  github-metrics:
    runs-on: ubuntu-latest
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: analizl
          base: ""
          template: classic
          config_timezone: America/Argentina/Buenos_Aires
          #plugin_lines: yes # Shows code additions/deletions and commits
          #plugin_activity: yes # Tracks recent activity including unmerged/active branches
          repositories_affiliations: owner, collaborator, organization_member
          plugin_calendar: yes
          plugin_calendar_limit: 1
          plugin_calendar_with_all_time: yes
