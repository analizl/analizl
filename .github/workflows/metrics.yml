name: Metrics
on:
  schedule: [{cron: "0 0 * * *"}] # Runs daily
  workflow_dispatch:
jobs:
  github-metrics:
    runs-on: ubuntu-latest
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: your-username
          template: classic
          config_timezone: America/Argentina/Santa_Rosa
          plugin_lines: yes # Shows code additions/deletions and commits
          plugin_activity: yes # Tracks recent activity including unmerged/active branches
